<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - SM Bombas Hidráulicas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="topo">

            <div class="logo">
                <img src="./imagens/logo.png" alt="Logo SM Bombas">
            </div>

            <div class="menu">
                <a href="index.html">Home</a>
                <a href="sobre.html">Sobre</a>
                <a class="ativo" href="contato.html">Contato</a>
                <a class="login" href="login.html">Login</a>

            </div>

        </div>
    </header>

    <main>

        <section class="pagina-contato">

            <h1>Entre em Contato</h1>

            <p>
                Envie sua dúvida, orçamento ou solicitação de serviço.
            </p>

            <form id="formulario">

                <input type="text" placeholder="Digite seu nome" required>

                <input type="email" placeholder="Digite seu e-mail" required>

                <textarea placeholder="Digite sua mensagem" required></textarea>

                <button type="submit">Enviar</button>

            </form>

            <div class="redes-sociais">

                <h2>Siga nossas redes sociais</h2>

                <div class="imagens">

                    <a href="#">
                        <img src="./imagens/Facebook_logo_(square).png" alt="Facebook">
                    </a>

                    <a href="#">
                        <img src="./imagens/Instagram_icon.png" alt="Instagram">
                    </a>

                    <a href="#">
                        <img src="./imagens/Youtube_logo.png" alt="YouTube">
                    </a>

                </div>

            </div>

        </section>

    </main>

    <footer>
        <p>© 2026 Hidráulica Pro Bombas Hidráulicas - Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
